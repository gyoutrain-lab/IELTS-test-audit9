<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional IELTS Audit & History System</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 15px 25px; background: #2c3e50; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        #certArea { display: none; margin-top: 40px; border: 8px double #2c3e50; padding: 30px; }
        .audit-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .audit-table td, .audit-table th { padding: 12px; border: 1px solid #ddd; }
        #historyTable { width: 100%; margin-top: 20px; border-collapse: collapse; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>IELTS Proficiency Audit System</h1>
    <div class="form-group"><input type="text" id="cName" placeholder="Candidate Full Name"></div>
    <div class="form-group"><input type="text" id="cID" placeholder="Candidate ID Number"></div>
    <div class="form-group"><select id="testType"><option value="Writing">Writing Task 2</option><option value="Speaking">Speaking Assessment</option></select></div>
    <div class="form-group"><textarea id="compDict" rows="2">hemodynamic, protocol, systematic, intervention, pharmacological, methodology, empirical, consequence</textarea></div>
    <div class="form-group"><textarea id="essayInput" rows="8" placeholder="Paste essay/transcript here..."></textarea></div>
    <button onclick="executeAudit()">Run Audit & Generate Certificate</button>
    <button onclick="viewHistory()" style="background:#555;">View Audit History</button>

    <!-- Certificate Output -->
    <div id="certArea">
        <h2 style="text-align:center;">OFFICIAL PROFICIENCY AUDIT</h2>
        <p><strong>Candidate:</strong> <span id="vName"></span> | <strong>ID:</strong> <span id="vID"></span> | <strong>Mode:</strong> <span id="vMode"></span></p>
        <table class="audit-table">
            <tr><th>Metric</th><th>Band Score</th></tr>
            <tr><td>Lexical Diversity</td><td id="vTTR"></td></tr>
            <tr><td>Competency Keyword Adherence</td><td id="vKeys"></td></tr>
            <tr><td>Grammatical Complexity</td><td id="vGra"></td></tr>
            <tr><td>Cohesion & Logic</td><td id="vCoh"></td></tr>
        </table>
        <h2 style="text-align:center;">OVERALL BAND: <span id="vBand"></span></h2>
        <p style="font-style:italic; border-left:4px solid #2c3e50; padding-left:10px;" id="vDiagnostic"></p>
        <button onclick="window.print()">Print Certificate</button>
    </div>

    <!-- History Log -->
    <table id="historyTable" border="1">
        <thead><tr><th>Date</th><th>Name</th><th>Band</th></tr></thead>
        <tbody id="historyBody"></tbody>
    </table>
</div>

<script>
function executeAudit() {
    const text = document.getElementById('essayInput').value;
    const words = text.toLowerCase().match(/\b(\w+)\b/g);
    if (!words || words.length < 50) { alert("Insufficient text."); return; }

    const wordCount = words.length;
    const uniqueWords = new Set(words).size;
    const dict = document.getElementById('compDict').value.toLowerCase().split(',').map(s => s.trim());
    
    // Logic Engines
    const ttr = Math.min(9, (uniqueWords / wordCount) * 12);
    const matches = dict.filter(w => text.toLowerCase().includes(w)).length;
    const keyScore = Math.min(9, (matches / Math.max(1, dict.length)) * 9);
    const complex = (text.match(/[,;](.*?)(although|while|because|if|unless|provided)/gi) || []).length;
    const graScore = Math.min(9, (complex / (wordCount / 200)) + 4);
    const coh = (text.match(/(furthermore|however|subsequently|consequently|in addition|whereas)/gi) || []).length;
    const cohScore = Math.min(9, (coh / (wordCount / 150)) + 4);

    const band = ((ttr + keyScore + graScore + cohScore) / 4).toFixed(1);

    // Diagnostics
    let feedback = band >= 7.5 ? "Professional Mastery: Advanced command of subject-specific terminology and logical structure." : 
                   band >= 6.0 ? "Competent Performance: Good logical flow, but requires more precise lexical variety." : 
                   "Developmental: Focus on increasing sentence complexity and academic marker usage.";

    // Save to History
    const record = { date: new Date().toLocaleDateString(), name: document.getElementById('cName').value, band: band };
    let history = JSON.parse(localStorage.getItem('auditHistory') || '[]');
    history.push(record);
    localStorage.setItem('auditHistory', JSON.stringify(history));

    // Update Display
    document.getElementById('vName').innerText = record.name;
    document.getElementById('vID').innerText = document.getElementById('cID').value;
    document.getElementById('vMode').innerText = document.getElementById('testType').value;
    document.getElementById('vTTR').innerText = ttr.toFixed(1);
    document.getElementById('vKeys').innerText = keyScore.toFixed(1);
    document.getElementById('vGra').innerText = graScore.toFixed(1);
    document.getElementById('vCoh').innerText = cohScore.toFixed(1);
    document.getElementById('vBand').innerText = band;
    document.getElementById('vDiagnostic').innerText = feedback;
    document.getElementById('certArea').style.display = 'block';
}

function viewHistory() {
    const history = JSON.parse(localStorage.getItem('auditHistory') || '[]');
    const body = document.getElementById('historyBody');
    body.innerHTML = history.map(r => `<tr><td>${r.date}</td><td>${r.name}</td><td>${r.band}</td></tr>`).join('');
    document.getElementById('historyTable').style.display = 'table';
}
</script>
</body>
</html>
