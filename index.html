<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic IELTS Competency Auditor</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        select, textarea, input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #1a5276; color: white; border: none; font-weight: bold; cursor: pointer; }
        .audit-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .audit-table td, .audit-table th { padding: 12px; border: 1px solid #ddd; }
        #certArea { display: none; margin-top: 30px; border: 5px solid #1a5276; padding: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dynamic Competency Auditor</h1>
    
    <div class="form-group">
        <label><strong>Select Area of Competency:</strong></label>
        <select id="compSelect" onchange="updateCompetencyDefaults()">
            <option value="Nursing">Nursing & Clinical Practice</option>
            <option value="Engineering">Structural Engineering</option>
            <option value="Finance">Financial Analysis</option>
            <option value="Education">Pedagogical Frameworks</option>
        </select>
    </div>

    <div class="form-group"><input type="text" id="cName" placeholder="Candidate Name"></div>
    <div class="form-group"><textarea id="compDict" rows="2"></textarea></div>
    <div class="form-group"><textarea id="essayInput" rows="8" placeholder="Paste response here..."></textarea></div>
    <button onclick="executeAudit()">Generate Certified Audit</button>

    <div id="certArea">
        <h2 style="text-align:center;">OFFICIAL COMPETENCY REPORT</h2>
        <p><strong>Field:</strong> <span id="vField"></span> | <strong>Candidate:</strong> <span id="vName"></span></p>
        <table class="audit-table">
            <tr><th>Metric</th><th>Band Score</th></tr>
            <tr><td>Lexical Diversity (TTR)</td><td id="vTTR"></td></tr>
            <tr><td>Competency Keyword Density</td><td id="vKeys"></td></tr>
            <tr><td>Syntactic Complexity</td><td id="vGra"></td></tr>
            <tr><td>Cohesion & Logic</td><td id="vCoh"></td></tr>
            <tr style="font-weight:bold; background:#f9f9f9;"><td>OVERALL BAND</td><td id="vBand"></td></tr>
        </table>
        <p id="vDiagnostic"></p>
    </div>
</div>

<script>
// Dynamic Competency Configuration
const competencyProfiles = {
    "Nursing": { keywords: "hemodynamic, protocol, systematic, intervention, pharmacological, patient, assessment", weight: 1.2 },
    "Engineering": { keywords: "structural, load-bearing, stability, infrastructure, mechanical, precision, analysis", weight: 1.4 },
    "Finance": { keywords: "liquidity, asset, allocation, risk, fiscal, audit, revenue, portfolio", weight: 1.3 },
    "Education": { keywords: "pedagogy, curriculum, assessment, engagement, cognitive, methodology, learning", weight: 1.1 }
};

function updateCompetencyDefaults() {
    const selected = document.getElementById('compSelect').value;
    document.getElementById('compDict').value = competencyProfiles[selected].keywords;
}

// Initialize on load
window.onload = updateCompetencyDefaults;

function executeAudit() {
    const field = document.getElementById('compSelect').value;
    const text = document.getElementById('essayInput').value;
    const words = text.toLowerCase().match(/\b(\w+)\b/g);
    if (!words) return;

    const wordCount = words.length;
    const dict = document.getElementById('compDict').value.split(',').map(s => s.trim());
    
    // Core Logic (Consistent across all competencies)
    const ttr = Math.min(9, (new Set(words).size / wordCount) * 12);
    const matches = dict.filter(w => text.toLowerCase().includes(w)).length;
    // Apply competency-specific scaling weight
    const keyScore = Math.min(9, (matches / dict.length) * (9 * competencyProfiles[field].weight));
    const gra = Math.min(9, ((text.match(/[,;]/g) || []).length / (wordCount / 100)) + 4);
    const coh = Math.min(9, ((text.match(/(furthermore|however|consequently|therefore)/gi) || []).length / (wordCount / 150)) + 4);

    const band = ((ttr + keyScore + gra + coh) / 4).toFixed(1);

    // Populate Results
    document.getElementById('vField').innerText = field;
    document.getElementById('vName').innerText = document.getElementById('cName').value;
    document.getElementById('vTTR').innerText = ttr.toFixed(1);
    document.getElementById('vKeys').innerText = keyScore.toFixed(1);
    document.getElementById('vGra').innerText = gra.toFixed(1);
    document.getElementById('vCoh').innerText = coh.toFixed(1);
    document.getElementById('vBand').innerText = band;
    document.getElementById('certArea').style.display = 'block';
}
</script>
</body>
</html>
